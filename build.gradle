// build.gradle — CodeAlpha DevOps Internship Task 3
// Java Application using Gradle with CI/CD integration

plugins {
    id 'java'
    id 'application'
}

group   = 'com.codealpha'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

application {
    mainClass = 'com.codealpha.Main'
}

repositories {
    mavenCentral()
}

dependencies {
    // JSON library
    implementation 'com.google.code.gson:gson:2.10.1'

    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testRuntimeOnly    'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

// Custom task: print build info
tasks.register('buildInfo') {
    doLast {
        println "====================================="
        println " Project : ${project.name}"
        println " Version : ${project.version}"
        println " Java    : ${JavaVersion.current()}"
        println " Group   : ${project.group}"
        println "====================================="
    }
}

// Run buildInfo before build
build.dependsOn buildInfo
